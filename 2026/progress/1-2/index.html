<!DOCTYPE HTML>
<html lang="en">

	<head>
		<title>1-2: Building Blocks</title>
		<meta charset="UTF-8">
	</head>

	<!-- Level 1: The <body> element contains everything visible on the webpage -->
	<!-- The style attribute adds CSS directly to this element -->
	<!-- Here, style="background-color: orange;" makes the background of the whole <body> area orange -->
	<body style="background-color: orange;">

		<!-- Level 2 (nested inside <body>): The <nav> element is a semantic element for navigation or menus -->
		<!-- The style attribute here sets this specific <nav> element's background color to red -->
		<nav style="background-color: red;">NAV: This is for a menu</nav>

		<!-- Level 2 (nested inside <body>): The <article> element is a semantic element for a self-contained article or main piece of content -->
		<!-- The style attribute here sets this specific <article> element's background color to pink -->
		<article style="background-color: pink;">Article: This is for an article of text</article>

		<!-- Level 2 (nested inside <body>): The <section> element is a semantic element for a section of content, often part of an article -->
		<!-- The style attribute here sets this specific <section> element's background color to yellow -->
		<section style="background-color: yellow;">Section: This is for each section of an article</section>

		<!-- Level 2 (nested inside <body>): The <p> element stands for paragraph -->
		<!-- The style attribute here sets this specific <p> element's background color to grey -->
		<p style="background-color: grey;">P: This is for each paragraph in a section</p>

		<!-- Level 2 (nested inside <body>): The <div> element is a non-semantic container used to group content -->
		<!-- Unlike <nav>, <article>, or <section>, <div> does not describe the meaning of the content -->
		<!-- The style attribute here sets this specific <div> element's background color to gold -->
		<div style="background-color: gold;">DIV: This is for a non-semantic division</div>

		<!-- Level 2 (nested inside <body>): The <h1> element is the main top-level heading of the page or a section -->
		<!-- The style attribute here sets this specific <h1> element's background color to tomato -->
		<h1 style="background-color: tomato;">H1: First-Level Heading</h1>

	<!-- Closing tag for <body>: ends the visible page content -->
	</body>

<!-- Closing tag for <html>: ends the whole HTML document -->
</html>
