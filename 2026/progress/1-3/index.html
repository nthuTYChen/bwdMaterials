<!DOCTYPE HTML>
<html lang="en">
	<head>
		<title>1-3: More building blocks</title>
		<meta charset="UTF-8">
	</head>
	<body>
		<header>Header: The header that should appear at the top of a webpage by default</header>
		<!-- This is an ordered list. -->
		<ol>
			<li>An ordered list item</li>
			<li>Another ordered list item</li>
		</ol>
		<ul>
			<li>An unordered list item</li>
			<li>Another unordered list item</li>
		</ul>
		<footer>Footer: The footer that should appear at the bottom of a webpage by default</footer>
	</body>
</html>
