<!DOCTYPE HTML>
<html lang="en">

	<head>
		<title>1-3: More building blocks</title>
		<meta charset="UTF-8">
	</head>
	<body>
		<!-- The <header> element represents introductory content at the top of the page -->
		<header>Header: The header that should appear at the top of a webpage by default</header>
		<!-- The <ol> element creates an ordered list -->
		<!-- "Ordered" means the items are shown in a sequence, usually with numbers like 1, 2, 3 -->
		<ol>

			<!-- The <li> element is one list item inside the ordered list -->
			<li>An ordered list item</li>

			<!-- Another <li> element, which becomes the second numbered item -->
			<li>Another ordered list item</li>

		<!-- Closing tag for <ol>: ends the ordered list -->
		</ol>

		<!-- The <ul> element creates an unordered list -->
		<!-- "Unordered" means the items are shown with bullet points instead of numbers -->
		<ul>

			<!--The <li> element is one list item inside the unordered list -->
			<li>An unordered list item</li>

			<!-- Another <li> element, which becomes the second bullet-point item -->
			<li>Another unordered list item</li>

		<!-- Closing tag for <ul>: ends the unordered list -->
		</ul>

		<!-- The <footer> element represents footer content at the bottom of the page -->
		<footer>Footer: The footer that should appear at the bottom of a webpage by default</footer>
	</body>
</html>
