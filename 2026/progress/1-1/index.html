<!DOCTYPE HTML> <!-- Declares that this document uses HTML5 -->
<!-- Every HTML tag block closes with a backslash / -->
<html lang="en"> <!-- Define the scope of an HTML document; lang="en" means the content is in English -->
	<head> <!-- Contains metadata about the document -->
		<title>1-1: The first HTML file</title> <!-- Sets the title shown in the browser tab -->
		<meta charset="UTF-8"> <!-- Specifies UTF-8 character encoding -->
	</head>
	<body> <!-- Contains the visible content of the webpage -->
		This is the first HTML file. <!-- The text displayed on the page -->
	</body>
</html>
